name: Build and Publish Wheels

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_wheels:
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel) dropped — works for CMF (~140s/job, no hang) but
        # adds wasted CI minutes; family-wide decision is Apple Silicon only.
        # cp313 added; cp38 EOL.
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # build-essential for the C++ toolchain (gcc/g++). cmake removed —
          # this isn't a CMake-driven build (setuptools+pybind11), so it was
          # being installed for nothing.
          sudo apt-get install -y build-essential

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build Wheels
        env:
          CXXFLAGS: "-std=c++11"
          CIBW_SKIP: "pypy*"
          CIBW_BUILD: "cp*"
        run: cibuildwheel --output-dir wheelhouse .

      - name: Run pytest against the built wheel
        # Linux only: cibuildwheel produces a manylinux wheel matching the
        # ambient Python; we install it and exercise tests_py/. macOS and
        # Windows wheels are tested implicitly via the post-publish verify
        # step. Skipping non-Linux here keeps each runner under ~3 minutes.
        if: runner.os == 'Linux'
        run: |
          pip install pytest matplotlib Pillow
          pip install --no-deps --force-reinstall wheelhouse/*manylinux*.whl
          pytest tests_py/ -v

      - name: Upload Wheels Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}-${{ github.run_number }}
          path: wheelhouse/*.whl
  
  
      - name: Install Twine
        run: pip install twine
  
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing wheelhouse/*.whl

      - name: Verify uploaded package (real import + filter call)
        run: |
          pip install --no-cache-dir --index-url https://pypi.org/simple/ pycirclemedianfilter
          python -c "import numpy as np, pycirclemedianfilter as cmf; out = cmf.medfilt_circ2d(np.zeros((4, 4)), 1, 1); assert out.shape == (4, 4), f'unexpected shape {out.shape}'; print('verify OK')"
