name: Build and Publish Wheels

# Triggered on every push to master, every PR, and every v*-tag push.
# Tag pushes additionally run the publish job (gated below) which uploads
# the built wheels to PyPI via OIDC trusted publishing.
on:
  push:
    branches: [ master ]
    tags: [ "v*" ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build_wheels:
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel) dropped — works for CMF (~140s/job, no hang) but
        # adds wasted CI minutes; family-wide decision is Apple Silicon only.
        # cp313 added; cp38 EOL.
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # build-essential for the C++ toolchain (gcc/g++). cmake removed —
          # this isn't a CMake-driven build (setuptools+pybind11), so it was
          # being installed for nothing.
          sudo apt-get install -y build-essential

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build Wheels
        env:
          CXXFLAGS: "-std=c++11"
          # i686 dropped: no meaningful Linux desktop install base in 2026.
          CIBW_SKIP: "pypy* *i686*"
        run: |
          # Pin cibuildwheel to the matrix Python only (default cp* would
          # build all 5 Pythons on every runner — same filenames overwrite
          # each other in download-artifact's merge-multiple, and a flaky
          # upload from any one of the 5 redundant copies leaves a corrupt
          # wheel in the merged dist for the publish job's twine check).
          PYV="${{ matrix.python-version }}"
          export CIBW_BUILD="cp${PYV//.}-*"
          cibuildwheel --output-dir wheelhouse .

      - name: Run pytest against the built wheel
        # Linux only: install the freshly-built wheel via --find-links so
        # pip picks the best-matching manylinux variant automatically (the
        # runner produces both manylinux_2_17 and manylinux_2_28 wheels for
        # the host Python). macOS and Windows wheels are exercised by the
        # post-publish verify step.
        if: runner.os == 'Linux'
        run: |
          pip install pytest matplotlib Pillow
          pip install --no-index --find-links wheelhouse/ --no-deps --force-reinstall pycirclemedianfilter
          pytest tests_py/ -v

      - name: Upload Wheels Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}-${{ github.run_number }}
          path: wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install build
        run: pip install build pybind11
      - name: Build sdist
        run: python -m build --sdist --outdir wheelhouse .
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: wheelhouse/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist]
    # Only on tag pushes — prevents every master merge from attempting an
    # upload (the previous workflow's behaviour, made benign only by twine's
    # --skip-existing).
    if: startsWith(github.ref, 'refs/tags/v')
    # The 'pypi' environment must exist in repo Settings → Environments.
    # See docs/pypi-publishing-setup.md in the devcontainer parent for the
    # one-time pending-publisher registration on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/project/pycirclemedianfilter/
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download all wheels and sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI (OIDC trusted publishing)
        # No PYPI_API_TOKEN here — PyPI's pending-publisher entry for this
        # repo + workflow + environment is the auth boundary. The
        # PYPI_API_TOKEN secret is retained in repo settings as a manual
        # fallback (user can `twine upload` from local if OIDC ever breaks).
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Verify uploaded package (real import + filter call)
        run: |
          # Brief delay so PyPI's CDN settles the new version.
          sleep 30
          pip install --no-cache-dir --index-url https://pypi.org/simple/ pycirclemedianfilter
          python -c "import numpy as np, pycirclemedianfilter as cmf; out = cmf.medfilt_circ2d(np.zeros((4, 4)), 1, 1); assert out.shape == (4, 4), f'unexpected shape {out.shape}'; print('verify OK')"
